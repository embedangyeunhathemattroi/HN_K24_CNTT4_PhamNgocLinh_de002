<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2>Employee Form</h2>

<form th:action="@{/employee/save}" method="post" enctype="multipart/form-data" th:object="${employee}">

  <input type="hidden" th:field="*{id}"/>

  <div class="mb-3">
    <label>Full Name</label>
    <input class="form-control" th:field="*{fullName}">
  </div>

  <div class="mb-3">
    <label>Position</label>
    <input class="form-control" th:field="*{position}">
  </div>

  <div class="mb-3">
    <label>Salary</label>
    <input type="number" class="form-control" th:field="*{salary}">
  </div>

  <div class="mb-3">
    <label>Avatar</label>
    <input type="file" name="file" class="form-control">
  </div>

  <button class="btn btn-success">Submit</button>
</form>
</body>
</html>
