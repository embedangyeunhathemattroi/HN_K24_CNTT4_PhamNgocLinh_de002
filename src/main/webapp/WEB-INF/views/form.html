<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2>Employee Form</h2>

<form th:action="@{/employee/save}" method="post" enctype="multipart/form-data" th:object="${employee}">

  <input type="hidden" th:field="*{id}"/>

  <div class="mb-3">
    <label>Nickname</label>
    <input class="form-control" th:field="*{fullName}" placeholder="Nhập fullName">

    <div class="text-danger" th:errors="*{fullName}"></div>
  </div>

  <div class="mb-3">
    <label>position</label>
    <input class="form-control" th:field="*{position}" placeholder="Nhập position">
    <div class="text-danger" th:errors="*{position}"></div>
  </div>

  <div class="mb-3">
    <label>salary</label>
    <input type="number" class="form-control" th:field="*{salary}" placeholder="Nhập salary" >
    <div class="text-danger" th:errors="*{salary}"></div>
  </div>

  <div class="mb-3">
    <label>Avatar</label>
    <input type="file" name="file" class="form-control" placeholder="choose avatar" >
  </div>

  <button class="btn btn-success" class="btn btn-primary mb-3">Submit</button>
</form>

</body>
</html>
