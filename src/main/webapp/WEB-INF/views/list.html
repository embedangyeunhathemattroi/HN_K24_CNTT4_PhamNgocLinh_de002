<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:color="">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Danh sách Các Nhân Viên Trong Công Ty</title>
</head>
<body class="container mt-4">

<header class="btn btn-primary mb-3">Header</header>

<h2>Danh sách Các Nhân Viên Trong Công Ty</h2>
<div>
    <a href="/employee/create" class="btn btn-primary mb-3"> ADD</a>
</div>
<div>
    <a href="/employee" class="btn btn-primary mb-3" > Search</a>
</div>


<div th:if="${#lists.isEmpty(employee)}" class="alert alert-warning">
    Chưa có Nhân Viên
</div>
<table class="table table-bordered" th:if="${!#lists.isEmpty(employee)}">
    <thead>
    <tr>
        <th>STT</th>
        <th>Nickname</th>
        <th>Vị Trí</th>
        <th>Lương</th>
        <th>Ảnh</th>
        <th>Actionz</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="c : ${employee}">
        <td th:text="${c.id}"></td>
        <td th:text="${c.fullName}"></td>
        <td th:text="${c.position}"></td>
        <td th:text="${c.salary}"></td>

        <td>
            <img th:src="@{'/images/' + ${c.avatar}}"
                 width="80" height="80">
        </td>

        <td>
            <a th:href="@{/employee/edit/{id}(id=${c.id})}" class="btn btn-warning">Edit</a>
            <a th:href="@{/employee/delete/{id}(id=${c.id})}" class="btn btn-danger">Delete</a>
        </td>
    </tr>
    </tbody>
</table>


<div>
    <a href="/employee" class="btn btn-primary mb-3" >Footer </a>
</div>
</body>
</html>
